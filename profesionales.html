<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Turnos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
    <header>

        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex flex-column">
            <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand" href="index.html">Sistema de Turnos </a>

                <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="pacientes.html">Pacientes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="profesionales.html">Profesionales</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="turnos.html">Turnos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    </header>


    <main class="container py-4">

        <div class="mb-4">
            <h1 class="h3">
                <i class="bi bi-person-vcard"></i>
                Gestión de Profesionales
            </h1>
        </div>

        <section class="card shadow-sm">

            <div class="card-header bg-white">
                <h2 class="h5 mb-0">
                    Profesionales </h2>
            </div>

            <div class="card-body">

                <form id="formProfesional" class="row g-3 mb-4">

                    <input type="hidden" id="profesionalId">

                    <div class="col-md-6">
                        <label for="nombreProfesional" class="form-label">
                            Nombre y Apellido
                        </label>
                        <input type="text" id="nombreProfesional" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="dniProfesional" class="form-label">
                            DNI
                        </label>
                        <input type="text" id="dniProfesional" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="especialidadProfesional" class="form-label">
                            Especialidad
                        </label>
                        <input type="text" id="especialidadProfesional" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="matriculaProfesional" class="form-label">
                            Matrícula
                        </label>
                        <input type="text" id="matriculaProfesional" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="telefonoProfesional" class="form-label">
                            Teléfono
                        </label>
                        <input type="text" id="telefonoProfesional" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="emailProfesional" class="form-label">
                            Email
                        </label>
                        <input type="email" id="emailProfesional" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label for="diasAtencionProfesional" class="form-label">
                            Días de atención
                        </label>
                        <input type="text" id="diasAtencionProfesional" class="form-control"
                            placeholder="Lunes, Miércoles y Viernes" required>
                    </div>

                    <div class="col-12 text-end">

                        <button type="reset" class="btn btn-outline-secondary">
                            Limpiar
                        </button>

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i>
                            Guardar profesional
                        </button>

                    </div>

                </form>



                <div id="contenedorProfesionales" class="row g-3">

                </div>

            </div>

        </section>
    </main>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="./js/profesionales.js"></script>
</body>

</html>
