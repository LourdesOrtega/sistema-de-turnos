<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesionales</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script src="profesionales.js" defer></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
    <section class="card shadow-sm mt-4">

    <div class="card-header bg-white">
        <h2 class="h5 mb-0">
            <i class="bi bi-person-badge"></i>
            Gestión de profesionales
        </h2>
    </div>

    <div class="card-body">

        <form id="formProfesional" class="row g-3 mb-4">

            <input type="hidden" id="profesionalId">

            <div class="col-md-6">
                <label for="nombreProfesional" class="form-label">
                    Nombre y apellido
                </label>
                <input
                    type="text"
                    id="nombreProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label for="dniProfesional" class="form-label">
                    DNI
                </label>
                <input
                    type="text"
                    id="dniProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label for="especialidadProfesional" class="form-label">
                    Especialidad
                </label>
                <input
                    type="text"
                    id="especialidadProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label for="matriculaProfesional" class="form-label">
                    Matrícula
                </label>
                <input
                    type="text"
                    id="matriculaProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label for="telefonoProfesional" class="form-label">
                    Teléfono
                </label>
                <input
                    type="text"
                    id="telefonoProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-md-6">
                <label for="emailProfesional" class="form-label">
                    Email
                </label>
                <input
                    type="email"
                    id="emailProfesional"
                    class="form-control"
                    required
                >
            </div>

            <div class="col-12">
                <label for="diasAtencionProfesional" class="form-label">
                    Días de atención
                </label>
                <input
                    type="text"
                    id="diasAtencionProfesional"
                    class="form-control"
                    placeholder="Lunes, Miércoles y Viernes"
                    required
                >
            </div>

            <div class="col-12 text-end">

                <button
                    type="reset"
                    class="btn btn-outline-secondary"
                >
                    Limpiar
                </button>

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    <i class="bi bi-save"></i>
                    Guardar profesional
                </button>

            </div>

        </form>

        <!--  mostrar las tarjetas -->

        <div
            id="contenedorProfesionales"
            class="row g-3"
        >

            

            <div class="col-md-6">

                <div class="card h-100">

                    <div class="card-body">

                        <h5 class="card-title">
                            Dr. Sergio Blanco
                        </h5>

                        <p>
                            <strong>DNI:</strong>
                            30222333
                        </p>

                        <p>
                            <strong>Especialidad:</strong>
                            Clínica Médica
                        </p>

                        <p>
                            <strong>Matrícula:</strong>
                            MP-12345
                        </p>

                        <p>
                            <strong>Teléfono:</strong>
                            3815551111
                        </p>

                        <p>
                            <strong>Email:</strong>
                            sergio@gmail.com
                        </p>

                        <p>
                            <strong>Días de atención:</strong>
                            Lunes, Miércoles y Viernes
                        </p>

                        <button
                            class="btn btn-warning btn-sm"
                        >
                            Editar
                        </button>

                        <button
                            class="btn btn-danger btn-sm"
                        >
                            Eliminar
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
</body>
</html>
