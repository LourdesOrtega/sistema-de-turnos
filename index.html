<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Turnos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex flex-column">
            <div class="container-fluid">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <a class="navbar-brand" href="index.html">
                    Sistema de Turnos
                </a>

                <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link" href="pacientes.html">
                                Pacientes
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="profesionales.html">
                                Profesionales
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="turnos.html">
                                Turnos
                            </a>
                        </li>

                    </ul>
                </div>

            </div>
        </nav>
    </header>

    <main class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">
                    <i class="bi bi-calendar-check"></i>
                    Turnos
                </h1>
            </div>
        </div>

       <br>
       <br>

        <section id="seccionEditarTurno" class="card shadow-sm mb-4 d-none">

            <div class="card-header bg-white">
                <h2 class="h5 mb-0">
                    <i class="bi bi-pencil-square"></i>
                    Editar turno
                </h2>
            </div>

            <div class="card-body">

                <form id="formEditarTurno" class="row g-3">

                    <input type="hidden" id="turnoIdEditar">

                    <div class="col-md-6">
                        <label for="profesionalEditar" class="form-label">
                            Profesional
                        </label>

                        <select id="profesionalEditar" class="form-select" required>
                            <option value="" selected disabled>
                                Seleccioná un profesional
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="estadoEditar" class="form-label">
                            Estado
                        </label>

                        <select id="estadoEditar" class="form-select" required>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Confirmado">Confirmado</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="fechaEditar" class="form-label">
                            Fecha
                        </label>

                        <input type="date" id="fechaEditar" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="horaEditar" class="form-label">
                            Hora
                        </label>

                        <input type="time" id="horaEditar" class="form-control" required>
                    </div>

                    <div class="col-12 text-end">

                        <button type="button" id="btnCancelarEdicion" class="btn btn-outline-secondary">
                            Cancelar
                        </button>

<button type="button" id="btnGuardarEdicion" class="btn btn-primary">
    <i class="bi bi-save"></i>
    Guardar cambios
</button>

                    </div>

                </form>

            </div>

        </section>

        
        <section class="card shadow-sm">

            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h2 class="h5 mb-0">
                    <i class="bi bi-table"></i>
                    Lista de turnos
                </h2>
            </div>

            <div class="card-body p-0">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Paciente</th>
                                <th>Profesional</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                                <th class="text-center">
                                    Acciones
                                </th>
                            </tr>
                        </thead>

                        <tbody id="contenedorTurnos">

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/index.js"></script>

</body>

</html>
