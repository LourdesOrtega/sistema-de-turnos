<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pacientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                Sistema de Turnos
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarTogglerDemo03">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarTogglerDemo03">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="pacientes.html">
                            Pacientes
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Profesionales
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Turnos
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <main class="container py-4">

        <div class="mb-4">
            <h1 class="h3">
                <i class="bi bi-person-vcard"></i>
                Gestión de Pacientes
            </h1>
        </div>

        <section class="card shadow-sm">

            <div class="card-header bg-white">
                <h2 class="h5 mb-0">
                    Pacientes
                </h2>
            </div>

            <div class="card-body">

                <form id="formPaciente" class="row g-3 mb-4">

                    <input type="hidden" id="pacienteId">

                    <div class="col-md-6">
                        <label for="nombrePaciente" class="form-label">
                            Nombre completo
                        </label>
                        <input type="text" id="nombrePaciente" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="dniPaciente" class="form-label">
                            DNI
                        </label>
                        <input type="text" id="dniPaciente" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label for="fechaNacimientoPaciente" class="form-label">
                            Fecha de nacimiento
                        </label>
                        <input type="date" id="fechaNacimientoPaciente" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label for="telefonoPaciente" class="form-label">
                            Teléfono
                        </label>
                        <input type="text" id="telefonoPaciente" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label for="obraSocialPaciente" class="form-label">
                            Obra Social
                        </label>
                        <input type="text" id="obraSocialPaciente" class="form-control" required>
                    </div>

                    <div class="col-12 text-end">

                        <button type="reset" class="btn btn-outline-secondary">
                            Limpiar
                        </button>

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i>
                            Guardar Paciente
                        </button>

                    </div>

                </form>

                <div id="contenedorPacientes" class="row g-3"></div>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/pacientes.js"></script>

</body>

</html>
